services:
  openosint:
    build: .
    image: openosint:latest
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - HIBP_API_KEY=${HIBP_API_KEY:-}
      - IPINFO_TOKEN=${IPINFO_TOKEN:-}
      - SHODAN_API_KEY=${SHODAN_API_KEY:-}
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY:-}
    volumes:
      - ./reports:/app/reports
    stdin_open: true
    tty: true
